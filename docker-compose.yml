services:
  # Laravel App (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radio_review_app
    restart: always
    tty: true
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/node_modules # ホストの空フォルダで上書きされないよう保護
      - vite_assets:/var/www/public/build # ビルド成果物を共有
    networks:
      - radio_review_network

  # Nginx (Web Server)
  webserver:
    image: nginx:alpine
    container_name: radio_review_nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
      - vite_assets:/var/www/public/build
    networks:
      - radio_review_network

  # Vite (Asset Builder) - ビルドはDockerイメージ作成時に完了
  vite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radio_review_vite
    working_dir: /var/www
    volumes:
      - vite_assets:/var/www/public/build:ro # ビルド済みアセットを読み取り専用で提供
    # ビルドは既にDockerfile内で完了しているため、何もせずに起動
    command: sh -c "echo 'Vite assets ready' && tail -f /dev/null"
    networks:
      - radio_review_network

  # MySQL (Database)
  db:
    image: mysql:8.0
    container_name: radio_review_db
    restart: always
    environment:
      MYSQL_DATABASE: radio_review
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: password
      MYSQL_USER: laravel
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - radio_review_network

  # Redis (Cache/Session)
  redis:
    image: redis:alpine
    container_name: radio_review_redis
    networks:
      - radio_review_network

networks:
  radio_review_network:
    driver: bridge

volumes:
  db_data:
  # ビルド成果物を他コンテナと安全に共有するためのボリューム
  vite_assets:
